<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-dot.online {
            background: #4caf50;
        }

        .status-dot.offline {
            background: #f44336;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Devices Panel */
        .devices-panel {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .devices-panel header {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            margin: 0;
            box-shadow: none;
            border-radius: 0;
        }

        .devices-list {
            list-style: none;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
        }

        .device-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .device-item:hover {
            background: #f8f8f8;
        }

        .device-item.active {
            background: #e8eaf6;
            border-left: 4px solid #667eea;
            padding-left: 11px;
        }

        .device-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .device-mac {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }

        .device-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }

        .device-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .device-status .dot.online {
            background: #4caf50;
        }

        .device-status .dot.offline {
            background: #f44336;
        }

        /* Logs Panel */
        .logs-panel {
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logs-header {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            border-radius: 0;
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            min-height: 400px;
            background: #fafafa;
        }

        .log-entry {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-left: 4px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            display: flex;
            gap: 10px;
        }

        .log-entry.INFO {
            border-left-color: #2196f3;
        }

        .log-entry.WARN {
            border-left-color: #ff9800;
        }

        .log-entry.ERROR {
            border-left-color: #f44336;
        }

        .log-entry.DEBUG {
            border-left-color: #9c27b0;
        }

        .log-time {
            color: #999;
            min-width: 70px;
        }

        .log-level {
            min-width: 50px;
            font-weight: 600;
        }

        .log-level.INFO {
            color: #2196f3;
        }

        .log-level.WARN {
            color: #ff9800;
        }

        .log-level.ERROR {
            color: #f44336;
        }

        .log-level.DEBUG {
            color: #9c27b0;
        }

        .log-message {
            flex: 1;
            color: #333;
            word-break: break-word;
        }

        .no-device-selected {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .no-device-selected p {
            font-size: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .connecting {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>📊 Device Dashboard</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot online"></span>
                    <span><strong id="devices-connected">0</strong> Connected</span>
                </div>
                <div class="status-item">
                    <span><strong id="devices-total">0</strong> Total Devices</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Devices Panel -->
            <div class="devices-panel">
                <header>🔌 Connected Devices</header>
                <ul class="devices-list" id="devices-list">
                    <div class="connecting">
                        <div class="spinner"></div>
                        <p>Loading devices...</p>
                    </div>
                </ul>
            </div>

            <!-- Logs Panel -->
            <div class="logs-panel">
                <div class="logs-header">📝 Live Logs</div>
                <div class="logs-container" id="logs-container">
                    <div class="no-device-selected">
                        <p>Select a device to view logs</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/dashboard.js"></script>
</body>

        ${e.msg}
    `;

</script>

</body>

</html>
